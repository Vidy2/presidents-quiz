<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Webpage Title (will show on tab) -->
    <title>Professional Portfolio</title>
    <style>
        /* Basic styling for the page */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }
        nav {
            margin: 1rem 0;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 1rem;
        }
        section {
            padding: 2rem;
            border-bottom: 1px solid #ddd;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>

    <section id="about">
        <h2>Review</h2>
            <input id ="message" type ="text" placeholder = "I mean if you want to leave a review">
            <button id = "submit">Submit</button>
        <p id = "status"></p>
    </section>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyremFCMmi5Qp9mmyL4NYewAxevx7uTFS25khuPMQjKKoFer7hVvJiO6QN8FWRNIyHU/exec";

document.getElementById("submit").addEventListener("click", async () => {
    const messageInput = document.getElementById("message");
    const status = document.getElementById("status");

    const message = messageInput.value;

    if (!message) {
        return;
    }


    try {
        const response = await fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({ message: message }),
            headers: {
                "Content-Type": "application/json"
            }
        });

        const result = await response.json();

        if (result.status === "success") {
            messageInput.value = "";
        }

    } catch (error) {
        console.error(error);
    }
});
</script>

</body>

</html>
