        .circle-container {
            position: relative;
            height: 500px; /* Or 100vh for full page */
            display: flex;
            justify-content: center;
            align-items: center;
            }

            .orbit {
            position: absolute;
            width: 50px;
            /* (360 / 45) = 8deg. We offset each image by its index. */
            transform: rotate(calc(var(--i) * 8deg)) translateX(200px);
            animation: orbit-rotate 20s linear infinite;
            }

            @keyframes orbit-rotate {
            from { transform: rotate(calc(var(--i) * 8deg)) translateX(200px) rotate(0deg); }
            to { transform: rotate(calc(var(--i) * 8deg + 360deg)) translateX(200px) rotate(-360deg); }
            }
    </style>
